name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint
        continue-on-error: true

      - name: Typecheck
        run: bunx tsc --noEmit
        continue-on-error: true

      - name: Build
        run: bun run build

      - name: Run tests
        run: |
          if grep -q '"test"' package.json; then
            bun run test
          else
            echo "No test script defined — skipping."
          fi